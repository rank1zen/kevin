services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${KEVIN_DB_USER}
      POSTGRES_PASSWORD: ${KEVIN_DB_PASSWORD}
      POSTGRES_DB: ${KEVIN_DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 10

  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /usr/local/bin/tern
    command: migrate
