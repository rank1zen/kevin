name: Run Static Checks and Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci-tasks:
    name: CI Tasks

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise ls # shows installed tools + versions
      - run: ls ~/.local/share/mise/installs/ # confirm the directory exists
      - run: ls ./assets
      - run: task ci
