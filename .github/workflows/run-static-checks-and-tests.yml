name: Run Static Checks and Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci-tasks:
    name: CI Tasks

    timeout-minutes: 4

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Lint checks
        run: mise run lint

      - name: Unit tests
        run: mise run test
